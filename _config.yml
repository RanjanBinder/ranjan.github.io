# Site settings
title: Ranjan | BI & IT Business Analyst
tagline: Turning data into decisions.
description: >-
  Portfolio of Ranjan — Business Intelligence & IT Business Analyst.
  SQL, data analytics, dashboards, and requirements engineering.
author: Ranjan
email: your.email@example.com
baseurl: "" # if deploying to username.github.io leave blank; for project site use "/repo-name"
url: "https://your-username.github.io"

# Social / contact
github_username: your-username
linkedin_username: your-linkedin
twitter_username: # optional

# Resume file (place PDF at assets/files/resume.pdf)
resume_file: /assets/files/resume.pdf

# Build settings
theme: minima
markdown: kramdown
permalink: /:categories/:title/
timezone: Asia/Kolkata

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:path/

# Navigation
header_pages:
  - about.md
  - projects.md
  - blog.md
  - certifications.md
  - contact.md

# Minima theme settings
minima:
  skin: classic
  social_links:
    - { platform: github, user_url: "https://github.com/your-username" }
    - { platform: linkedin, user_url: "https://linkedin.com/in/your-linkedin" }

# Plugins (GitHub Pages supports these)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor/
